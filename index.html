<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ha Thu's Album 🎧</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f7e8ff, #fdfcff);
            color: #5a4a6a;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
        }

        /* Hero Player - Chiếm trọn 2 cột */
        .player {
            grid-column: span 2;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 15px 35px rgba(160, 102, 255, 0.1);
        }

        .disc-wrapper {
            position: relative;
            width: 180px;
            height: 180px;
            margin: 0 auto 20px;
        }

        .disc {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, #333 10%, #111 40%, #a066ff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: spin 8s linear infinite;
            box-shadow: 0 0 30px rgba(160, 102, 255, 0.3);
        }

        .disc img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid #fff;
        }

        /* Progress Bar */
        .progress-container {
            width: 80%;
            margin: 20px auto;
        }
        .bar {
            height: 8px;
            background: #eee;
            border-radius: 10px;
            overflow: hidden;
        }
        .fill {
            height: 100%;
            width: 65%; /* Tượng trưng cho progress */
            background: linear-gradient(90deg, #c084fc, #a066ff);
        }

        /* Card Style - Biến mỗi mục thành 1 "Mini Album" */
        .card {
            background: rgba(255, 255, 255, 0.7);
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: all 0.4s ease;
            border: 1px solid rgba(255,255,255,0.5);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: scale(1.02);
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 15px 30px rgba(192, 132, 252, 0.2);
        }

        /* Thumbnail ảnh cho từng mục */
        .card-img {
            width: 100%;
            height: 150px;
            border-radius: 15px;
            object-fit: cover;
            margin-bottom: 15px;
            transition: 0.5s;
        }

        .card:hover .card-img {
            filter: brightness(1.1);
        }

        /* Chi tiết các item */
        h2 {
            font-size: 20px;
            margin: 0 0 15px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .track-item {
            padding: 12px 15px;
            background: #fdfaff;
            border-radius: 12px;
            margin-bottom: 8px;
            font-size: 14px;
            border-left: 4px solid transparent;
            transition: 0.3s;
            display: flex;
            justify-content: space-between;
        }

        .track-item:hover {
            border-left-color: #c084fc;
            background: #f5eaff;
            padding-left: 20px;
        }

        /* Animation */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Layout so le cho thú vị */
        .mt-large { margin-top: 40px; }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
            .mt-large { margin-top: 0; }
        }
    </style>
</head>
