<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ha Thu Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: #fdfaff; /* Màu nền tím cực nhạt */
            font-family: 'Space Grotesk', sans-serif;
            color: #2e1065;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        /* Container chính */
        .wrapper {
            max-width: 1000px;
            width: 100%;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: minmax(150px, auto);
            gap: 15px;
            margin-top: 20px;
        }

        /* Style chung cho các ô */
        .box {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 24px;
            padding: 25px;
            transition: 0.4s ease;
            position: relative;
            box-shadow: 0 4px 20px rgba(168, 85, 247, 0.05);
        }

        .box:hover {
            transform: translateY(-5px);
            border-color: #d8b4fe;
            box-shadow: 0 10px 30px rgba(168, 85, 247, 0.1);
        }

        /* Ô Profile to nhất */
        .profile {
            grid-column: span 2;
            grid-row: span 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(135deg, #ffffff, #f5eaff);
        }

        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 3px solid #a855f7;
            margin-bottom: 15px;
            object-fit: cover;
        }

        /* Ô Stats (màu tím đậm làm điểm nhấn) */
        .stats {
            grid-column: span 2;
            background: #a855f7;
            color: white;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .stat-item h2 { font-size: 32px; }
        .stat-item p { font-size: 12px; opacity: 0.9; }

        /* Ô Ảnh nghệ thuật */
        .image-box {
            grid-column: span 1;
            grid-row: span 2;
            padding: 0;
            overflow: hidden;
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Ô Skills */
        .skills { grid-column: span 2; }
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        .tag {
            background: #f3e8ff;
            color: #7e22ce;
            padding: 6px 14px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
        }

        /* Ô Contact/Link */
        .connect {
            grid-column: span 1;
            background: #2e1065;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Chữ nghĩa */
        h1 { font-size: 28px; margin-bottom: 5px; }
