<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thu Hà Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(270deg, #c084fc, #e9d5ff, #ffffff, #d8b4fe);
      background-size: 800% 800%;
      animation: gradientMove 15s ease infinite;
      cursor: none;
    }

    @keyframes gradientMove {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    .glass {
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 20px;
      transition: all 0.3s ease;
    }

    /* Hiệu ứng nổi khi ấn (Active state) */
    .clickable:active {
      transform: scale(0.95);
      box-shadow: inset 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .glow-text {
      animation: glow 2s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from {text-shadow: 0 0 5px #a855f7, 0 0 10px #a855f7;}
      to {text-shadow: 0 0 20px #c084fc, 0 0 30px #c084fc;}
    }

    .star {
      position: fixed;
      font-size: 14px;
      pointer-events: none;
      animation: fade 0.8s linear forwards;
      z-index: 9999;
    }

    @keyframes fade {
      0% {opacity:1; transform: scale(1) translateY(0);}
      100% {opacity:0; transform: scale(2) translateY(-20px);}
    }

    .interest-card {
      width: 180px;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .interest-card:hover {
      transform: scale(1.1) rotate(2deg);
    }
  </style>
</head>

<body class="text-gray-800 overflow-x-hidden">

<div class="fixed inset-0 glass -z-10"></div>

<header class="p-6 flex justify-between items-center glass sticky top-0 z-50">
  <h1 class="text-2xl font-bold text-purple-600 glow-text">Thu Hà</h1>
