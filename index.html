<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thu Hà Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(270deg, #c084fc, #e9d5ff, #ffffff, #d8b4fe);
      background-size: 800% 800%;
      animation: gradientMove 15s ease infinite;
      cursor: none;
    }

    @keyframes gradientMove {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    .glass {
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(15px);
      border-radius: 20px;
    }

    .glow-text {
      animation: glow 2s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from {text-shadow: 0 0 5px #a855f7, 0 0 10px #a855f7;}
      to {text-shadow: 0 0 20px #c084fc, 0 0 30px #c084fc;}
    }

    .star {
      position: fixed;
      font-size: 14px;
      pointer-events: none;
      animation: fade 0.8s linear forwards;
    }

    @keyframes fade {
      0% {opacity:1; transform: scale(1);}
      100% {opacity:0; transform: scale(2);}
    }
  </style>
</head>

<body class="text-gray-800 overflow-x-hidden">

<!-- glass layer -->
<div class="fixed inset-0 glass -z-10"></div>

<header class="p-6 flex justify-between glass sticky top-0">
  <h1 class="text-2xl font-bold text-purple-600 glow-text">Thu Hà</h1>
</header>

<section class="h-screen flex flex-col justify-center items-center text-center">
  <h2 class="text-6xl font-extrabold text-purple-700 mb-4 glow-text">Thu Hà ✨</h2>
  <p id="typing" class="text-lg"></p>
</section>

<section class="p-16 text-center">
  <h3 class="text-3xl font-bold text-purple-700 mb-6 glow-text">Skills</h3>
  <div class="grid md:grid-cols-4 gap-6">
    <div class="glass p-6">Excel</div>
    <div class="glass p-6">Word</div>
    <div class="glass p-6">SQL</div>
    <div class="glass p-6">PowerPoint</div>
  </div>
</section>

<audio id="bg-music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-slowmotion.mp3" type="audio/mpeg">
</audio>

<button onclick="toggleMusic()" class="fixed bottom-5 right-5 bg-purple-600 text-white px-4 py-2 rounded-full shadow-lg">
  🎵
</button>

<script>
// typing
const text = "Finance & Banking Student | Aesthetic Lover";
let i = 0;
function typing() {
  document.getElementById("typing").innerText = text.slice(0, i) + "|";
  i++;
  if (i <= text.length) setTimeout(typing, 50);
}
typing();

// music toggle
function toggleMusic() {
  const music = document.getElementById("bg-music");
  if (music.paused) music.play();
  else music.pause();
}

// autoplay after click
window.addEventListener("click", () => {
  document.getElementById("bg-music").play();
}, { once: true });

// star cursor
window.addEventListener("mousemove", (e) => {
  const star = document.createElement("div");
  star.className = "star";
  star.innerText = "⭐";
  star.style.left = e.clientX + "px";
  star.style.top = e.clientY + "px";
  document.body.appendChild(star);
  setTimeout(()=>star.remove(),800);
});
</script>

</body>
</html>
